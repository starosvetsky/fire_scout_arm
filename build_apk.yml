name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Project Structure & Android Files
        run: |
          # 1. Робот сам раскладывает ваши файлы по правильным папкам
          mkdir -p lib/screens lib/models lib/services
          mv main.dart lib/ || true
          mv map_screen.dart lib/screens/ || true
          mv hotspot.dart lib/models/ || true
          mv database_helper.dart lib/services/ || true
          
          # 2. Робот генерирует недостающие системные файлы Android
          flutter create --platforms=android .
          
          # 3. Робот добавляет права на GPS и Интернет для карты
          python3 -c '
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r") as f: content = f.read()
          perms = "<uses-permission android:name=\"android.permission.INTERNET\"/>\n<uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\"/>\n<uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\"/>\n<application"
          content = content.replace("<application", perms)
          with open(path, "w") as f: f.write(content)
          '

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
