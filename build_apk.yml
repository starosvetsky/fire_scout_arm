    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Android Wrapper & Permissions
        run: |
          # 1. Создаем системные файлы Android вокруг нашего готового кода
          flutter create --platforms=android .
          
          # 2. Добавляем права на GPS и Интернет
          python3 -c '
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r") as f: content = f.read()
          perms = "<uses-permission android:name=\"android.permission.INTERNET\"/>\n<uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\"/>\n<uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\"/>\n<application"
          content = content.replace("<application", perms)
          with open(path, "w") as f: f.write(content)
          '

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
